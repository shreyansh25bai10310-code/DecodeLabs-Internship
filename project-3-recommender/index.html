<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Career Navigator</title>
<style>
:root{
--bg:#09090b;
--card:#111113;
--border:#27272a;
--text:#fafafa;
--muted:#a1a1aa;
--primary:#4f8cff;
--secondary:#8b5cf6;
--radius:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,system-ui,sans-serif;
background:
radial-gradient(circle at top left,rgba(79,140,255,.15),transparent 40%),
radial-gradient(circle at bottom right,rgba(139,92,246,.12),transparent 40%),
var(--bg);
color:var(--text);
padding:32px;
}
.container{max-width:1200px;margin:auto;background:rgba(17,17,19,.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.06);border-radius:28px;padding:32px}
.hero{text-align:center;padding:30px 0 40px}
.hero h1{font-size:56px;line-height:1.1}
.hero span{background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;color:transparent}
.hero p{color:var(--muted);margin-top:12px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px}
.stat{text-align:center}
.stat h2{color:var(--primary)}
.search{width:100%;padding:14px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:white}
.skills{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.chip{padding:10px 14px;border-radius:999px;border:1px solid var(--border);cursor:pointer;background:var(--card)}
.chip.active{background:linear-gradient(135deg,var(--primary),var(--secondary));border:none}
button.main{width:100%;padding:16px;margin-top:20px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;font-size:16px;cursor:pointer}
#winner{display:none;margin-top:24px;padding:28px;border-radius:24px;background:linear-gradient(135deg,var(--primary),var(--secondary));text-align:center}
.result{margin-top:16px}
.role{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-top:12px}
.bar{height:8px;background:#222;border-radius:999px;overflow:hidden;margin-top:10px}
.fill{height:100%;background:linear-gradient(135deg,var(--primary),var(--secondary))}
@media(max-width:768px){.stats{grid-template-columns:1fr}.hero h1{font-size:38px}}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<h1>Find Your Perfect <span>Tech Career</span></h1>
<p>TF‑IDF + Cosine Similarity powered career discovery</p>
</div>

<div class="stats">
<div class="card stat"><h2>15</h2><p>Career Paths</p></div>
<div class="card stat"><h2 id="count">0</h2><p>Skills Selected</p></div>
<div class="card stat"><h2 id="best">—</h2><p>Top Match</p></div>
</div>

<input class="search" placeholder="Search skills..." id="search">

<div class="skills" id="skills"></div>

<button class="main" onclick="runEngine()">Analyze My Profile</button>

<div id="winner"></div>
<div id="results"></div>
</div>

<script>
const skillsList=["Python","JavaScript","React","Node.js","SQL","Docker","AWS","Azure","TensorFlow","PyTorch","Machine Learning","Kubernetes","HTML","CSS","TypeScript"];
const roles=[
{role:"ML Engineer",skills:["Python","Machine Learning","TensorFlow","PyTorch","Docker"]},
{role:"Frontend Developer",skills:["JavaScript","React","HTML","CSS","TypeScript"]},
{role:"Backend Developer",skills:["Python","Node.js","SQL","Docker"]},
{role:"Cloud Architect",skills:["AWS","Azure","Kubernetes","Docker"]},
{role:"Full Stack Developer",skills:["React","Node.js","SQL","JavaScript","TypeScript"]}
];
const selected=new Set();
const skills=document.getElementById("skills");

function render(list=skillsList){
skills.innerHTML="";
list.forEach(s=>{
const el=document.createElement("div");
el.className="chip"+(selected.has(s)?" active":"");
el.innerText=s;
el.onclick=()=>{
selected.has(s)?selected.delete(s):selected.add(s);
document.getElementById("count").innerText=selected.size;
render(filter());
};
skills.appendChild(el);
});
}

function filter(){
const q=document.getElementById("search").value.toLowerCase();
return skillsList.filter(s=>s.toLowerCase().includes(q));
}

document.getElementById("search").oninput=()=>render(filter());

function cosine(a,b,terms){
let dot=0,ma=0,mb=0;
terms.forEach(t=>{
dot+=(a[t]||0)*(b[t]||0);
ma+=(a[t]||0)**2;
mb+=(b[t]||0)**2;
});
return ma&&mb?dot/(Math.sqrt(ma)*Math.sqrt(mb)):0;
}

function runEngine(){
const docs=roles.map(r=>r.skills);
const all=[...new Set(docs.flat())];
const idf={};
all.forEach(t=>{
const df=docs.filter(d=>d.includes(t)).length;
idf[t]=Math.log(docs.length/(df+1))+1;
});

const uv={};
all.forEach(t=>uv[t]=selected.has(t)?idf[t]:0);

const scored=roles.map(r=>{
const vec={};
all.forEach(t=>vec[t]=r.skills.includes(t)?idf[t]:0);
return {...r,score:cosine(uv,vec,all)};
}).sort((a,b)=>b.score-a.score);

document.getElementById("best").innerText=Math.round(scored[0].score*100)+"%";

document.getElementById("winner").style.display="block";
document.getElementById("winner").innerHTML=`🏆 <h2>${scored[0].role}</h2><p>${(scored[0].score*100).toFixed(1)}% Match</p>`;

const results=document.getElementById("results");
results.innerHTML="";
scored.forEach(r=>{
const pct=(r.score*100).toFixed(1);
results.innerHTML+=`
<div class="role">
<h3>${r.role}</h3>
<p>${pct}% Compatibility</p>
<div class="bar"><div class="fill" style="width:${pct}%"></div></div>
</div>`;
});
}
render();
</script>
</body>
</html>
